<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<title>Contrato de Consignação Revisado</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; background:#f5f5f5; }
.container { background:#fff; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
input { width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px; }
button { padding:10px 15px; margin-right:10px; border:none; border-radius:5px; cursor:pointer; }
.btn-gerar { background:#28a745; color:#fff; }
.btn-pdf { background:#007bff; color:#fff; }
#contrato { margin-top:30px; line-height:1.6; color:#000; }
h3 { margin-top:20px; }
@media print {
  button, input, h3 { display:none; }
  body { background:#fff; }
}
</style>
</head>
<body>
<div class="container">

<h2>Contrato de Consignação Mercantil</h2>

<h3>Dados do Cliente</h3>
<input id="razao" placeholder="Razão Social">
<input id="cnpj" placeholder="CNPJ">
<input id="endereco" placeholder="Endereço completo">

<h3>Responsável Legal</h3>
<input id="nome_pedido" placeholder="Número do pedido">  
<input id="nome" placeholder="Nome completo">
<input id="cpf" placeholder="CPF">
<input id="telefone" placeholder="Telefone">
<input id="email" placeholder="Email">

<button class="btn-gerar" onclick="gerarContrato()">Gerar Contrato</button>
<button class="btn-pdf" onclick="gerarPDF()">Baixar PDF</button>

<div id="contrato"></div>

</div>

<script>
function gerarContrato() {
  const data = new Date();
  const dataFormatada = data.toLocaleString("pt-BR");

  const razao = document.getElementById("razao").value;
  const cnpj = document.getElementById("cnpj").value;
  const endereco = document.getElementById("endereco").value;

  const nome = document.getElementById("nome").value;
  const cpf = document.getElementById("cpf").value;
  const telefone = document.getElementById("telefone").value;
  const email = document.getElementById("email").value;

  document.getElementById("contrato").innerHTML = `
  <h3 style="text-align:center;">CONTRATO DE CONSIGNAÇÃO MERCANTIL</h3>

  <p><strong>CONSIGNANTE:</strong> SCHNEIDER COMÉRCIO DE BEBIDAS LTDA, inscrita no CNPJ 63.626.734/0001-09.</p>

  <p><strong>CONSIGNATÁRIO:</strong> ${razao}, inscrita no CNPJ ${cnpj}, com sede em ${endereco}.</p>

  <p><strong>RESPONSÁVEL LEGAL:</strong> ${nome}, inscrito no CPF ${cpf}, telefone ${telefone}, e-mail ${email}.</p>

  <p><strong>CLÁUSULA 1 – OBJETO:</strong> O presente contrato tem como objeto a consignação de bebidas para comercialização.</p>

  <p><strong>CLÁUSULA 2 – PAGAMENTO:</strong> O consignatário pagará apenas pelos produtos efetivamente vendidos, conforme as condições estabelecidas nas Cláusulas 5 e 6.</p>

  <p><strong>CLÁUSULA 3 – CONTROLE DE LOTE E VALIDADE:</strong> Todos os produtos serão entregues com controle de lote e validade.</p>
  <p>Produtos vencidos não serão aceitos para devolução, sendo caracterizada tentativa de fraude ou má conservação.</p>

  <p><strong>CLÁUSULA 4 – RESPONSABILIDADE:</strong> O consignatário é responsável pela guarda, conservação e integridade dos produtos.</p>

 <h3>CLÁUSULA 5 – DA CONTAGEM, APURAÇÃO E AUDITORIA</h3>

<p>5.1. <strong>CONTAGEM SEMANAL:</strong> O CONSIGNATÁRIO obriga-se a realizar a contagem física do estoque e informar o volume de vendas ao CONSIGNANTE, via formulário eletrônico ou canal oficial, impreterivelmente até <strong>terça-feira da semana seguinte ao recebimento</strong> ou ao período de apuração anterior.</p>

<p>5.2. <strong>FATURAMENTO POR OMISSÃO:</strong> A ausência de comunicação da contagem no prazo estipulado (Cláusula 5.1) implicará na presunção de venda de <strong>50% (cinquenta por cento)</strong> do saldo consignado, autorizando o faturamento automático e imediato deste valor pelo CONSIGNANTE.</p>

<p>5.3. <strong>AUDITORIA:</strong> O CONSIGNANTE poderá realizar auditorias físicas periódicas para conferência do estoque. Tais visitas deverão ser <strong>previamente agendadas</strong> com o CONSIGNATÁRIO, que deverá franquear o acesso aos produtos e documentos de controle.</p>

<p>5.4. <strong>AJUSTES:</strong> Caso a auditoria ou contagem posterior identifique divergências entre o faturado e o vendido, o saldo será compensado ou cobrado no ciclo de faturamento subsequente.</p>

  <h3>CLÁUSULA 6 – DO PAGAMENTO E INADIMPLÊNCIA</h3>

  <p>6.1. O pagamento pelos produtos efetivamente vendidos, conforme apurado na Cláusula 5, deverá ser realizado pelo CONSIGNATÁRIO até o [definir dia, ex: 10º dia útil] do mês subsequente ao período de apuração, mediante [definir forma de pagamento, ex: boleto bancário, PIX, transferência].</p>

  <p>6.2. Em caso de atraso no pagamento, o valor devido será acrescido de multa de 2% (dois por cento) sobre o valor em atraso, juros de mora de 1% (um por cento) ao mês e correção monetária pelo [definir índice, ex: IPCA/IGP-M] pro rata die, desde a data do vencimento até a data do efetivo pagamento.</p>

  <p>6.3. O não pagamento de qualquer valor devido por um período superior a [definir período, ex: 30 dias] poderá acarretar a rescisão imediata do presente contrato, sem prejuízo da cobrança judicial ou extrajudicial dos valores em aberto, acrescidos de todas as despesas e honorários advocatícios.</p>

  <h3>CLÁUSULA 7 – DA RESCISÃO</h3>

  <p>7.1. O presente contrato poderá ser rescindido por qualquer das partes, a qualquer tempo, mediante aviso prévio de [definir prazo, ex: 30 dias] por escrito.</p>

  <p>7.2. Constituem, ainda, motivos para rescisão imediata do contrato, independentemente de aviso prévio:
      a) O descumprimento de qualquer das Cláusulas deste contrato pelo CONSIGNATÁRIO, especialmente as relativas à contagem, apuração de vendas e pagamento.
      b) A decretação de falência ou recuperação judicial de qualquer das partes.
      c) A prática de atos ilícitos ou fraudulentos por qualquer das partes.</p>

  <p>7.3. Em caso de rescisão, o CONSIGNATÁRIO deverá, no prazo de [definir prazo, ex: 5 dias] úteis, devolver todos os produtos consignados que estiverem em seu poder e efetuar o pagamento de todos os valores devidos até a data da rescisão, sob pena de cobrança judicial.</p>

  <p><strong>DATA E HORA:</strong> ${dataFormatada}</p>
  <p>De acordo com os termos citados acima, favor gerar o PDF e realizar a impressão por meio do Gov.br.</p>

  <br><br>
  <p>_____________________________________<br>CONSIGNANTE</p>
  <br>
  <p>_____________________________________<br>CONSIGNATÁRIO</p>

<p>Schneider Bebidas agradeço: Telefone: (47) 93386-0900 R. 304, 538 - sala 04 - Meia Praia</p>

  `;
}

function gerarPDF() {
  gerarContrato();
  setTimeout(() => {
    window.print();
  }, 300);
}
</script>

</body>
</html>
